<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>靈魂之鏡 塔羅占卜</title>
  
  <!-- 載入 Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 載入 React 與 ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- 載入 Babel 以便在瀏覽器編譯 JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- 自訂 CSS 動畫 -->
  <style>
    body { background-color: #020617; } /* slate-950 */
    .perspective-1000 { perspective: 1000px; }
    .transform-style-3d { transform-style: preserve-3d; }
    .backface-hidden { backface-visibility: hidden; }
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }
    .animate-float { animation: float 4s ease-in-out infinite; }
    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 15px rgba(139, 92, 246, 0.2); }
      50% { box-shadow: 0 0 30px rgba(139, 92, 246, 0.5); }
    }
  </style>
</head>
<body class="text-slate-200 font-sans selection:bg-purple-500/30 overflow-x-hidden">
  
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- 0. 內建 SVG 圖示庫 ---
    const iconPaths = {
      Sparkles: '<path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M3 5h4"/><path d="M19 17v4"/><path d="M17 19h4"/>',
      Moon: '<path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/>',
      Sun: '<circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/>',
      Star: '<polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>',
      RefreshCw: '<path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/>',
      AlertCircle: '<circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/>',
      Flame: '<path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/>',
      Droplets: '<path d="M7 16.3c2.2 0 4-1.83 4-4.05 0-1.16-.57-2.26-1.71-3.19S7.29 6.75 7 5.3c-.29 1.45-1.14 2.84-2.29 3.76S3 11.1 3 12.25c0 2.22 1.8 4.05 4 4.05z"/><path d="M12.56 6.6A10.97 10.97 0 0 0 14 3.02c.5 2.5 2 4.9 4 6.5s3 3.5 3 5.5a6.98 6.98 0 0 1-11.91 4.97"/>',
      Zap: '<polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>',
      CircleDot: '<circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="1"/>',
      Compass: '<circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/>'
    };

    const Icon = ({ name, className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} dangerouslySetInnerHTML={{ __html: iconPaths[name] }} />
    );

    // --- 1. 建立 78 張塔羅牌庫 ---
    const MAJOR_ARCANA = [
      "0 愚者 (The Fool)", "I 魔術師 (The Magician)", "II 女祭司 (The High Priestess)", "III 皇后 (The Empress)", 
      "IV 皇帝 (The Emperor)", "V 教皇 (The Hierophant)", "VI 戀人 (The Lovers)", "VII 戰車 (The Chariot)", 
      "VIII 力量 (Strength)", "IX 隱士 (The Hermit)", "X 命運之輪 (Wheel of Fortune)", "XI 正義 (Justice)", 
      "XII 倒吊人 (The Hanged Man)", "XIII 死神 (Death)", "XIV 節制 (Temperance)", "XV 惡魔 (The Devil)", 
      "XVI 高塔 (The Tower)", "XVII 星星 (The Star)", "XVIII 月亮 (The Moon)", "XIX 太陽 (The Sun)", 
      "XX 審判 (Judgement)", "XXI 世界 (The World)"
    ];

    const SUITS = [
      { zh: "權杖", en: "Wands" },
      { zh: "聖杯", en: "Cups" },
      { zh: "寶劍", en: "Swords" },
      { zh: "錢幣", en: "Pentacles" }
    ];
    const RANKS = [
      { zh: "一", en: "Ace" }, { zh: "二", en: "Two" }, { zh: "三", en: "Three" }, { zh: "四", en: "Four" }, 
      { zh: "五", en: "Five" }, { zh: "六", en: "Six" }, { zh: "七", en: "Seven" }, { zh: "八", en: "Eight" }, 
      { zh: "九", en: "Nine" }, { zh: "十", en: "Ten" }, 
      { zh: "侍者", en: "Page" }, { zh: "騎士", en: "Knight" }, { zh: "皇后", en: "Queen" }, { zh: "國王", en: "King" }
    ];

    const MINOR_ARCANA = SUITS.flatMap(s => RANKS.map(r => `${s.zh}${r.zh} (${r.en} of ${s.en})`));
    const FULL_DECK = [...MAJOR_ARCANA, ...MINOR_ARCANA];

    // --- 2. 內建本地塔羅演算法 (取代原本容易卡住的 API) ---
    // 根據抽到的牌與正逆位，組合出對應的解讀文本
    const generateLocalReading = async (question, drawnCards, spreadType) => {
      // 模擬神祕的等待時間，讓翻牌動畫能順利播完 (2.5秒)
      await new Promise(resolve => setTimeout(resolve, 2500));

      let resultText = "";

      const getCardMeaning = (cardName, isReversed) => {
        let coreMeaning = "";
        let actionDo = "";
        let actionDont = "";
        let quote = "";

        // 大阿爾克那解讀
        if (cardName.match(/愚者|魔術師|女祭司|皇后|皇帝|教皇|戀人|戰車|力量|隱士|命運之輪|正義|倒吊人|死神|節制|惡魔|高塔|星星|月亮|太陽|審判|世界/)) {
          coreMeaning = isReversed ? "這張大牌逆位暗示著能量的延遲、內在的抗拒，或是你需要重新審視人生方向的重大課題。" : "這張大牌代表著強大的命運推動力、重要的轉折點，以及靈魂層面的深刻啟示。";
          actionDo = isReversed ? "向內尋求答案，給自己多一點時間沉澱。" : "順應這股強大的能量，勇敢迎接改變。";
          actionDont = isReversed ? "不要強求外在的結果，避免逆勢而為。" : "不要因為恐懼而退縮，錯失良機。";
          quote = "命運的軌跡有時隱晦，但一切都在宇宙的安排之中。";

          if (cardName.includes("戰車")) {
             coreMeaning = isReversed ? "方向失控、意志力瓦解、遇到無法預期的阻礙。" : "衝刺、控制、勝利、強大的意志力。";
          } else if (cardName.includes("死神") || cardName.includes("高塔")) {
             coreMeaning = isReversed ? "抗拒改變、無法放下過去、逃避必然的崩塌。" : "結束與重生、告別過去、徹底而震撼的轉變。";
          }
        }
        // 小阿爾克那：權杖 (火元素)
        else if (cardName.includes("權杖")) {
          coreMeaning = isReversed ? "行動受阻、熱情消退、計畫延遲、缺乏動力。" : "行動力、熱情、創造力、新計畫的推動。";
          actionDo = isReversed ? "重新找回初心，休養生息，調整步伐。" : "把握當下的熱情，積極採取行動。";
          actionDont = isReversed ? "不要勉強推進已經失去動力的事物。" : "不要猶豫不決，錯失良機。";
          quote = "熱情是點燃生命之火的引信。";
        }
        // 小阿爾克那：聖杯 (水元素)
        else if (cardName.includes("聖杯")) {
          coreMeaning = isReversed ? "情感失落、人際關係受挫、過度敏感或逃避現實。" : "情感豐富、愛、直覺、和諧的人際關係。";
          actionDo = isReversed ? "療癒內在的創傷，學會愛自己。" : "敞開心胸，順應情感的流動，表達你的愛。";
          actionDont = isReversed ? "不要封閉內心，或過度依賴他人。" : "不要忽視直覺帶給你的溫柔訊息。";
          quote = "愛與被愛，都是靈魂最深的渴望。";
        }
        // 小阿爾克那：寶劍 (風元素)
        else if (cardName.includes("寶劍")) {
          coreMeaning = isReversed ? "思緒混亂、過度焦慮、言語傷害、無法做出決定。" : "清晰的思考、邏輯、溝通、面對挑戰的勇氣。";
          actionDo = isReversed ? "放下鑽牛角尖的想法，尋求客觀的建議。" : "保持理智，用清晰的溝通化解問題。";
          actionDont = isReversed ? "避免在情緒不穩時做出重大決定。" : "不要用尖銳的言語傷害在乎你的人。";
          quote = "清晰的思緒能斬斷一切迷惘。";
        }
        // 小阿爾克那：錢幣 (土元素)
        else if (cardName.includes("錢幣")) {
          coreMeaning = isReversed ? "財務壓力、物質匱乏、工作不順、缺乏安全感。" : "財富累積、踏實、穩定、工作與物質的收穫。";
          actionDo = isReversed ? "重新檢視資源狀況，節流開源，腳踏實地。" : "踏實耕耘，穩健累積資源，享受成果。";
          actionDont = isReversed ? "避免投機取巧或過度物質主義。" : "不要好高騖遠，忽略了基礎的穩固。";
          quote = "每一份收穫，都來自腳踏實地的耕耘。";
        }

        return { coreMeaning, actionDo, actionDont, quote };
      };

      // 組合最終輸出的 Markdown 文本
      drawnCards.forEach((card, i) => {
        const { coreMeaning, actionDo, actionDont, quote } = getCardMeaning(card.name, card.isReversed);
        const positionName = spreadType === 'three' ? (i === 0 ? "過去" : i === 1 ? "現在" : "未來") : "指引";
        
        resultText += `### 🔮 占卜結果：${card.name} (${card.isReversed ? '逆位' : '正位'}) - ${positionName}\n`;
        resultText += `---\n`;
        resultText += `**【核心牌義】**\n${coreMeaning}\n\n`;
        resultText += `**【針對問題點的深入分析】**\n針對你的問題「${question}」，這張牌出現在此處，暗示著相關的能量狀態正受到上述特質的影響。${card.isReversed ? '你可能正遇到一些內在的阻力或盲點，需要放慢腳步來覺察。' : '這是一個清晰的訊號，順應這股能量將有助於你找到突破口。'}\n\n`;
        resultText += `**【具體的行動建議】**\n`;
        resultText += `* **Do (建議做)：** ${actionDo}\n`;
        resultText += `* **Don't (應避免)：** ${actionDont}\n\n`;
        resultText += `**【靈魂啟示】**\n「${quote}」\n\n`;
      });

      return resultText;
    };

    // --- 3. 主應用程式元件 ---
    function App() {
      const [question, setQuestion] = useState("");
      const [spread, setSpread] = useState("single"); 
      const [drawnCards, setDrawnCards] = useState([]);
      const [reading, setReading] = useState("");
      const [isLoading, setIsLoading] = useState(false);
      const [error, setError] = useState("");
      const readingEndRef = useRef(null);

      const handleDrawCards = async () => {
        if (!question.trim()) {
          setError("請先在星盤上刻下你的問題...");
          return;
        }
        setError("");
        setIsLoading(true);
        setReading("");
        setDrawnCards([]);

        const cardCount = spread === 'single' ? 1 : 3;
        const shuffled = [...FULL_DECK].sort(() => 0.5 - Math.random());
        const selected = shuffled.slice(0, cardCount).map(cardName => ({
          name: cardName,
          isReversed: Math.random() > 0.5,
          revealed: false
        }));

        setDrawnCards(selected);

        try {
          // 呼叫本地演算法，永遠不會卡住或報錯
          const resultText = await generateLocalReading(question, selected, spread);
          setReading(resultText);
        } catch (err) {
          setError("宇宙的訊號暫時受到干擾，請重新凝聚意念再試一次。");
          console.error(err);
        } finally {
          setIsLoading(false);
        }
      };

      useEffect(() => {
        if (drawnCards.length > 0 && drawnCards.some(c => !c.revealed)) {
          const timer = setTimeout(() => {
            setDrawnCards(prev => {
              const next = [...prev];
              const unrevealedIdx = next.findIndex(c => !c.revealed);
              if (unrevealedIdx !== -1) next[unrevealedIdx].revealed = true;
              return next;
            });
          }, 800);
          return () => clearTimeout(timer);
        }
      }, [drawnCards]);

      useEffect(() => {
        if (reading && drawnCards.every(c => c.revealed)) {
          readingEndRef.current?.scrollIntoView({ behavior: 'smooth' });
        }
      }, [reading, drawnCards]);

      const formatText = (text) => {
        return text.split('\n').map((line, index) => {
          if (line.startsWith('### ')) return <h3 key={index} className="text-2xl font-bold text-amber-300 mt-8 mb-4 tracking-wider border-b border-amber-900/50 pb-2 drop-shadow-[0_0_8px_rgba(252,211,77,0.4)]">{line.replace('### ', '')}</h3>;
          if (line.startsWith('**【')) return <h4 key={index} className="text-xl font-bold text-amber-500 mt-6 mb-2 tracking-wide flex items-center"><Icon name="Sparkles" className="w-4 h-4 mr-2 text-amber-400" />{line.replace(/\*\*/g, '')}</h4>;
          if (line.startsWith('* **Do')) return <p key={index} className="text-emerald-200 ml-6 mb-2 bg-emerald-950/30 p-3 rounded-lg border border-emerald-900/50"><span className="font-bold text-emerald-400 tracking-wider">▲ 建議行動：</span> {line.replace('* **Do (建議做)：**', '').replace('* **Do：**', '')}</p>;
          if (line.startsWith('* **Don\'t')) return <p key={index} className="text-rose-200 ml-6 mb-2 bg-rose-950/30 p-3 rounded-lg border border-rose-900/50"><span className="font-bold text-rose-400 tracking-wider">▼ 避免盲點：</span> {line.replace('* **Don\'t (應避免)：**', '').replace('* **Don\'t：**', '')}</p>;
          if (line.startsWith('---')) return <div key={index} className="flex items-center justify-center my-8"><div className="w-16 h-px bg-amber-900/80"></div><Icon name="Star" className="w-3 h-3 text-amber-700 mx-2" /><div className="w-16 h-px bg-amber-900/80"></div></div>;
          if (line.trim() === '') return <div key={index} className="h-2"></div>;
          return <p key={index} className="text-slate-300 leading-relaxed mb-3 text-lg">{line.replace(/\*\*/g, '')}</p>;
        });
      };

      const getCardIcon = (name) => {
        if (name.includes("Wands") || name.includes("權杖")) return <Icon name="Flame" className="w-16 h-16 text-amber-500 drop-shadow-[0_0_15px_rgba(245,158,11,0.8)]" />;
        if (name.includes("Cups") || name.includes("聖杯")) return <Icon name="Droplets" className="w-16 h-16 text-blue-400 drop-shadow-[0_0_15px_rgba(96,165,250,0.8)]" />;
        if (name.includes("Swords") || name.includes("寶劍")) return <Icon name="Zap" className="w-16 h-16 text-slate-300 drop-shadow-[0_0_15px_rgba(203,213,225,0.8)]" />;
        if (name.includes("Pentacles") || name.includes("錢幣")) return <Icon name="CircleDot" className="w-16 h-16 text-emerald-500 drop-shadow-[0_0_15px_rgba(16,185,129,0.8)]" />;
        
        return (
          <div className="relative w-16 h-16">
            <Icon name="Sun" className="absolute inset-0 w-16 h-16 text-amber-300 animate-[spin_10s_linear_infinite] opacity-70" />
            <Icon name="Moon" className="absolute inset-0 w-16 h-16 text-purple-400 drop-shadow-[0_0_10px_rgba(192,132,252,0.8)]" />
          </div>
        );
      };

      return (
        <div className="min-h-screen relative">
          
          {/* 神祕學背景裝飾 */}
          <div className="fixed inset-0 pointer-events-none overflow-hidden opacity-30 z-0">
            <div className="absolute top-[-20%] left-[-10%] w-[50%] h-[50%] bg-purple-900 rounded-full blur-[150px] animate-pulse"></div>
            <div className="absolute bottom-[-20%] right-[-10%] w-[60%] h-[60%] bg-indigo-900 rounded-full blur-[150px]"></div>
            <div className="absolute top-[30%] left-[30%] w-[40%] h-[40%] bg-amber-900/50 rounded-full blur-[180px]"></div>
            {/* 模擬星光粒子 */}
            {[...Array(20)].map((_, i) => (
              <div key={i} className="absolute rounded-full bg-white" 
                   style={{
                     top: `${Math.random() * 100}%`, left: `${Math.random() * 100}%`,
                     width: `${Math.random() * 3 + 1}px`, height: `${Math.random() * 3 + 1}px`,
                     opacity: Math.random() * 0.5 + 0.1,
                     animation: `pulse ${Math.random() * 3 + 2}s infinite`
                   }}>
              </div>
            ))}
          </div>

          <div className="max-w-4xl mx-auto px-4 py-12 relative z-10">
            {/* Header */}
            <header className="text-center mb-16 relative">
              <div className="inline-flex items-center justify-center p-4 bg-slate-900/50 rounded-full mb-6 border border-purple-500/30 shadow-[0_0_30px_rgba(139,92,246,0.3)] animate-float backdrop-blur-sm">
                <Icon name="Compass" className="w-8 h-8 text-purple-400" />
              </div>
              <h1 className="text-4xl md:text-6xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-purple-300 via-amber-200 to-indigo-300 mb-4 tracking-widest drop-shadow-lg">
                靈魂之鏡 塔羅占卜
              </h1>
              <p className="text-indigo-200/80 text-lg md:text-xl font-light tracking-wide mt-4">靜下心來，默念你的困惑，讓星辰為你指引方向。</p>
            </header>

            {/* Input Section */}
            <div className="bg-slate-900/60 backdrop-blur-lg border border-slate-700/50 p-6 md:p-8 rounded-3xl shadow-[0_10px_40px_rgba(0,0,0,0.5)] mb-16 relative overflow-hidden">
              <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-purple-500 to-transparent opacity-50"></div>
              
              <div className="mb-8">
                <label className="flex items-center text-purple-300 font-semibold mb-4 text-lg tracking-wide">
                  <Icon name="Star" className="w-5 h-5 mr-2 text-amber-400" /> 你想問什麼？
                </label>
                <textarea
                  className="w-full bg-slate-950/80 border border-purple-900/50 rounded-2xl p-5 text-slate-200 focus:outline-none focus:border-purple-500 focus:ring-1 focus:ring-purple-500 transition-all resize-none placeholder-slate-600 shadow-inner text-lg"
                  rows="3"
                  placeholder="例如：我接下來三個月的事業方向應該如何調整？"
                  value={question}
                  onChange={(e) => setQuestion(e.target.value)}
                  disabled={isLoading}
                />
              </div>

              <div className="flex flex-col md:flex-row justify-between items-center gap-6">
                <div className="flex items-center space-x-4">
                  <label className="text-slate-400 font-medium tracking-wide">選擇陣法：</label>
                  <div className="flex bg-slate-950/80 rounded-xl p-1.5 border border-slate-800 shadow-inner">
                    <button
                      onClick={() => setSpread('single')}
                      disabled={isLoading}
                      className={`px-5 py-2.5 rounded-lg text-sm font-bold tracking-wide transition-all ${spread === 'single' ? 'bg-gradient-to-b from-purple-800 to-purple-950 text-purple-200 shadow-[0_0_10px_rgba(168,85,247,0.4)]' : 'text-slate-500 hover:text-purple-300'}`}
                    >
                      單張指引
                    </button>
                    <button
                      onClick={() => setSpread('three')}
                      disabled={isLoading}
                      className={`px-5 py-2.5 rounded-lg text-sm font-bold tracking-wide transition-all ${spread === 'three' ? 'bg-gradient-to-b from-purple-800 to-purple-950 text-purple-200 shadow-[0_0_10px_rgba(168,85,247,0.4)]' : 'text-slate-500 hover:text-purple-300'}`}
                    >
                      過去・現在・未來
                    </button>
                  </div>
                </div>

                <button
                  onClick={handleDrawCards}
                  disabled={isLoading}
                  style={{ animation: isLoading ? 'none' : 'pulse-glow 3s infinite' }}
                  className={`flex items-center justify-center px-10 py-4 rounded-2xl font-bold text-lg tracking-widest transition-all duration-300 ${
                    isLoading 
                      ? 'bg-slate-800 text-slate-500 cursor-not-allowed border border-slate-700' 
                      : 'bg-gradient-to-br from-amber-600 via-purple-700 to-indigo-800 text-white hover:from-amber-500 hover:via-purple-600 hover:to-indigo-700 border border-purple-400/50 shadow-xl'
                  }`}
                >
                  {isLoading ? (
                    <>
                      <Icon name="RefreshCw" className="w-6 h-6 mr-3 animate-spin text-purple-400" />
                      傾聽星辰的回音...
                    </>
                  ) : (
                    <>
                      <Icon name="Sparkles" className="w-6 h-6 mr-3 text-amber-300" />
                      {spread === 'single' ? '揭開命運之牌' : '展開時光之陣'}
                    </>
                  )}
                </button>
              </div>
              
              {error && (
                <div className="mt-6 p-4 bg-rose-950/40 border border-rose-900/80 rounded-xl flex items-center text-rose-300 backdrop-blur-sm">
                  <Icon name="AlertCircle" className="w-6 h-6 mr-3 flex-shrink-0" />
                  <p className="tracking-wide">{error}</p>
                </div>
              )}
            </div>

            {/* Cards Display Section */}
            {drawnCards.length > 0 && (
              <div className="mb-16 perspective-1000">
                <h2 className="text-2xl font-bold text-center text-purple-300 mb-12 tracking-widest flex items-center justify-center">
                  <Icon name="Star" className="w-5 h-5 mr-3 text-amber-500 opacity-70" /> 
                  神諭的展現 
                  <Icon name="Star" className="w-5 h-5 ml-3 text-amber-500 opacity-70" />
                </h2>
                
                <div className={`flex flex-wrap justify-center gap-8 md:gap-14 ${spread === 'three' ? 'md:justify-between' : ''}`}>
                  {drawnCards.map((card, index) => {
                    const zhName = card.name.split(' (')[0]; 
                    const enName = card.name.match(/\((.*?)\)/)?.[1] || "";
                    
                    return (
                      <div key={index} className="flex flex-col items-center">
                        {spread === 'three' && (
                          <span className={`mb-5 font-bold tracking-[0.2em] text-sm border px-6 py-1.5 rounded-full transition-all duration-700 ${card.revealed ? 'bg-purple-950/80 border-purple-500/50 text-purple-200 shadow-[0_0_10px_rgba(168,85,247,0.3)]' : 'bg-slate-900 border-slate-700 text-slate-500'}`}>
                            {index === 0 ? '過去 (PAST)' : index === 1 ? '現在 (PRESENT)' : '未來 (FUTURE)'}
                          </span>
                        )}

                        <div className="relative w-[180px] h-[300px] md:w-[220px] md:h-[360px] perspective-1000 cursor-pointer">
                          <div 
                            className="w-full h-full transition-transform duration-1000 ease-[cubic-bezier(0.4,0,0.2,1)] transform-style-3d shadow-2xl rounded-2xl"
                            style={{ transform: card.revealed ? 'rotateY(180deg)' : 'rotateY(0deg)' }}
                          >
                            {/* 牌背 */}
                            <div className="absolute inset-0 backface-hidden bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-indigo-900 via-purple-950 to-slate-950 rounded-2xl border-2 border-indigo-500/30 flex flex-col items-center justify-center shadow-[0_0_20px_rgba(79,70,229,0.3)]">
                              <div className="absolute inset-3 border border-indigo-400/20 rounded-xl opacity-50"></div>
                              <div className="absolute inset-6 border border-purple-400/20 rounded-lg opacity-30"></div>
                              <Icon name="Compass" className="w-16 h-16 text-indigo-400/40 animate-[spin_20s_linear_infinite]" />
                              <Icon name="Star" className="absolute w-6 h-6 text-amber-600/50" />
                            </div>

                            {/* 牌面 */}
                            <div 
                              className="absolute inset-0 backface-hidden bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-slate-800 via-slate-900 to-slate-950 rounded-2xl border-2 border-amber-600/50 flex flex-col items-center justify-between p-6 shadow-[inset_0_0_30px_rgba(0,0,0,0.8)]"
                              style={{ transform: `rotateY(180deg) ${card.isReversed ? 'rotateZ(180deg)' : ''}` }}
                            >
                              <div className="absolute inset-2 border-x border-amber-500/20"></div>
                              <div className="absolute inset-2 border-y border-amber-500/20"></div>
                              
                              <div className="text-center z-10 w-full mt-2">
                                <h3 className="text-2xl font-black text-amber-400 drop-shadow-[0_2px_4px_rgba(0,0,0,0.8)] tracking-widest">{zhName}</h3>
                              </div>

                              <div className="flex-grow flex items-center justify-center w-full relative">
                                {getCardIcon(card.name)}
                              </div>
                              
                              <div className="text-center z-10 w-full mb-2">
                                <p className="text-[10px] md:text-xs text-amber-200/60 font-medium uppercase tracking-[0.2em]">{enName}</p>
                              </div>
                            </div>
                          </div>
                        </div>
                        
                        <div className={`mt-6 transition-opacity duration-700 ${card.revealed ? 'opacity-100' : 'opacity-0'}`}>
                          <span className={`inline-flex items-center px-5 py-2 rounded-full text-sm font-bold tracking-widest border shadow-lg ${
                            card.isReversed 
                              ? 'bg-rose-950/60 text-rose-300 border-rose-800/50 shadow-[0_0_15px_rgba(225,29,72,0.2)]' 
                              : 'bg-emerald-950/60 text-emerald-300 border-emerald-800/50 shadow-[0_0_15px_rgba(16,185,129,0.2)]'
                          }`}>
                            {card.isReversed ? '▼ 逆位' : '▲ 正位'}
                          </span>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}

            {/* Reading Status Section */}
            {isLoading && drawnCards.every(c => c.revealed) && !reading && (
              <div className="text-center py-16 flex flex-col items-center justify-center space-y-6 animate-pulse">
                <div className="relative w-20 h-20">
                  <div className="absolute inset-0 border-4 border-transparent border-t-purple-500 border-r-amber-500 rounded-full animate-[spin_2s_linear_infinite]"></div>
                  <div className="absolute inset-2 border-4 border-transparent border-b-indigo-400 border-l-purple-400 rounded-full animate-[spin_3s_linear_infinite_reverse]"></div>
                  <Icon name="Star" className="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-6 h-6 text-amber-300" />
                </div>
                <p className="text-purple-300 font-bold tracking-widest text-lg">正在連結阿卡西紀錄，編譯靈魂的訊息...</p>
              </div>
            )}

            {/* Result Section */}
            {!isLoading && reading && drawnCards.every(c => c.revealed) && (
              <div className="bg-slate-900/80 backdrop-blur-xl border border-purple-500/30 p-8 md:p-12 rounded-[2rem] shadow-[0_20px_60px_rgba(0,0,0,0.6)] relative overflow-hidden">
                <div className="absolute -top-32 -right-32 w-64 h-64 bg-purple-600/20 rounded-full blur-[100px]"></div>
                <div className="absolute -bottom-32 -left-32 w-64 h-64 bg-amber-600/10 rounded-full blur-[100px]"></div>

                <div className="absolute -top-5 left-1/2 transform -translate-x-1/2 bg-slate-950 px-8 py-2 rounded-full border border-purple-500/50 text-purple-300 text-sm font-black tracking-[0.3em] flex items-center shadow-[0_0_20px_rgba(168,85,247,0.4)]">
                  <Icon name="Moon" className="w-4 h-4 mr-3 text-amber-400" /> 命運的解讀 <Icon name="Sun" className="w-4 h-4 ml-3 text-amber-400" />
                </div>
                
                <div className="prose prose-invert max-w-none mt-8 relative z-10">
                  {formatText(reading)}
                </div>
                <div ref={readingEndRef} className="h-10" />
              </div>
            )}
            
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
